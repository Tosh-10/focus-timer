<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Focus">
<meta name="theme-color" content="#0f172a">
<title>Focus Timer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<style>
  :root {
    --bg: #0f172a;
    --bg-2: #1e293b;
    --work: #ef4444;
    --work-glow: rgba(239, 68, 68, 0.35);
    --rest: #22c55e;
    --rest-glow: rgba(34, 197, 94, 0.35);
    --text: #f1f5f9;
    --muted: #94a3b8;
    --track: #334155;
    --accent: #38bdf8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  html { background: #0f172a; }            /* fills iOS overscroll/bounce area so no white shows */
  body { overscroll-behavior: none; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    transition: background 0.6s ease;
    overflow-x: hidden;
  }
  body.work  { background: radial-gradient(120% 120% at 50% 0%, #2a1416 0%, var(--bg) 55%); }
  body.rest  { background: radial-gradient(120% 120% at 50% 0%, #0f2a1a 0%, var(--bg) 55%); }

  main {
    width: 100%;
    max-width: 460px;
    padding: 24px 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .phase-label {
    font-size: 14px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--muted);
    transition: color 0.4s ease;
  }
  body.work .phase-label { color: var(--work); }
  body.rest .phase-label { color: var(--rest); }

  /* Timer ring */
  .ring-wrap { position: relative; width: 280px; height: 280px; max-width: 80vw; max-height: 80vw; }
  .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--track); stroke-width: 10; }
  .ring-fg {
    fill: none;
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke 0.4s ease;
  }
  body.work .ring-fg { stroke: var(--work); filter: drop-shadow(0 0 8px var(--work-glow)); }
  body.rest .ring-fg { stroke: var(--rest); filter: drop-shadow(0 0 8px var(--rest-glow)); }

  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
  }
  .time { font-size: 58px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .session-count { font-size: 13px; color: var(--muted); }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 16px; }
  button {
    font-family: inherit;
    color: var(--text);
    border: none;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.2s ease, opacity 0.2s ease;
  }
  button:active { transform: scale(0.92); }
  .btn-round {
    background: var(--bg-2);
    border: 1px solid var(--track);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-secondary { width: 56px; height: 56px; }
  .btn-secondary svg { width: 22px; height: 22px; }
  .btn-primary {
    width: 84px; height: 84px;
    background: var(--accent);
    color: #04212e;
    box-shadow: 0 6px 20px rgba(56, 189, 248, 0.3);
  }
  .btn-primary svg { width: 34px; height: 34px; }
  .icon { stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .icon-fill { fill: currentColor; stroke: none; }

  .hint { font-size: 12px; color: var(--muted); text-align: center; min-height: 16px; }

  /* Settings panel */
  .settings {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--track);
    border-radius: 18px;
    overflow: hidden;
  }
  .settings summary {
    list-style: none;
    cursor: pointer;
    padding: 16px 20px;
    font-weight: 600;
    font-size: 15px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .settings summary::-webkit-details-marker { display: none; }
  .settings summary .chev { transition: transform 0.2s ease; color: var(--muted); }
  .settings[open] summary .chev { transform: rotate(180deg); }
  .settings-body { padding: 4px 20px 22px; display: flex; flex-direction: column; gap: 20px; }

  .field { display: flex; flex-direction: column; gap: 8px; }
  .field-row { display: flex; align-items: center; justify-content: space-between; }
  .field label { font-size: 14px; color: var(--text); font-weight: 500; }
  .field .val { font-size: 13px; color: var(--accent); font-variant-numeric: tabular-nums; font-weight: 600; }

  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 6px; border-radius: 3px;
    background: var(--track); outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%; border: none;
    background: var(--accent); cursor: pointer;
  }

  .num-field { display: flex; flex-direction: column; gap: 8px; }
  .stepper { display: flex; align-items: center; gap: 12px; }
  .stepper button {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--track); color: var(--text);
    font-size: 22px; font-weight: 600; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .stepper .num { flex: 1; text-align: center; font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .durations { display: flex; gap: 16px; }
  .durations .num-field { flex: 1; }

  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .chip {
    background: var(--track); color: var(--text);
    border: 1px solid transparent;
    border-radius: 999px; padding: 7px 12px;
    font-size: 12px; font-weight: 500;
  }
  .chip.active { background: rgba(56,189,248,0.15); border-color: var(--accent); color: var(--accent); }

  .sound-toggle { display: flex; align-items: center; gap: 10px; }
  .switch { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider-sw {
    position: absolute; inset: 0; background: var(--track);
    border-radius: 999px; transition: background 0.2s ease;
  }
  .slider-sw::before {
    content: ""; position: absolute; height: 20px; width: 20px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: transform 0.2s ease;
  }
  .switch input:checked + .slider-sw { background: var(--accent); }
  .switch input:checked + .slider-sw::before { transform: translateX(20px); }

  footer { font-size: 11px; color: var(--muted); text-align: center; padding-bottom: 8px; }
</style>
</head>
<body class="work">
<main>
  <div class="phase-label" id="phaseLabel">Focus</div>

  <div class="ring-wrap">
    <svg viewBox="0 0 200 200">
      <circle class="ring-bg" cx="100" cy="100" r="92"></circle>
      <circle class="ring-fg" id="ringFg" cx="100" cy="100" r="92"></circle>
    </svg>
    <div class="ring-center">
      <div class="time" id="timeDisplay">25:00</div>
      <div class="session-count" id="sessionCount">Session 1</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-round btn-secondary" id="backBtn" title="Restart step (or previous step within 5s)" aria-label="Go back">
      <!-- skip back (mirror of skip forward) -->
      <svg class="icon-fill" viewBox="0 0 24 24"><path d="M19 5v14l-9-7z"/><rect x="5" y="5" width="3" height="14" rx="1"/></svg>
    </button>
    <button class="btn-round btn-primary" id="playBtn" title="Start / Pause" aria-label="Start or pause">
      <svg class="icon-fill" id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="btn-round btn-secondary" id="skipBtn" title="Skip to next step" aria-label="Skip to next step">
      <!-- skip forward -->
      <svg class="icon-fill" viewBox="0 0 24 24"><path d="M5 5v14l9-7z"/><rect x="16" y="5" width="3" height="14" rx="1"/></svg>
    </button>
  </div>

  <div class="hint" id="hint">Press play to begin · white noise plays during focus</div>

  <details class="settings" id="settings">
    <summary>
      <span>Settings</span>
      <span class="chev">▾</span>
    </summary>
    <div class="settings-body">
      <div class="durations">
        <div class="num-field">
          <label>Focus (min)</label>
          <div class="stepper">
            <button data-act="dec" data-target="work">−</button>
            <span class="num" id="workNum">25</span>
            <button data-act="inc" data-target="work">+</button>
          </div>
        </div>
        <div class="num-field">
          <label>Rest (min)</label>
          <div class="stepper">
            <button data-act="dec" data-target="rest">−</button>
            <span class="num" id="restNum">5</span>
            <button data-act="inc" data-target="rest">+</button>
          </div>
        </div>
      </div>

      <div class="sound-toggle">
        <label class="switch">
          <input type="checkbox" id="soundOn" checked>
          <span class="slider-sw"></span>
        </label>
        <label for="soundOn">White noise during focus</label>
      </div>

      <div class="field">
        <div class="field-row">
          <label for="volume">Volume</label>
          <span class="val" id="volumeVal">50%</span>
        </div>
        <input type="range" id="volume" min="0" max="100" value="50">
      </div>

      <div class="field">
        <div class="field-row">
          <label for="tone">Tone (deep ↔ bright)</label>
          <span class="val" id="toneVal">2000 Hz</span>
        </div>
        <input type="range" id="tone" min="100" max="12000" value="2000" step="100">
        <span style="font-size:11px;color:var(--muted)">Low = soft rumble · High = bright hiss</span>
        <div class="presets" id="presets">
          <button class="chip" data-tone="180">Brown · deep focus</button>
          <button class="chip" data-tone="600">Rain · calm</button>
          <button class="chip" data-tone="1200">Pink · balanced</button>
          <button class="chip" data-tone="4000">White · alert</button>
          <button class="chip" data-tone="9000">Bright · masking</button>
        </div>
      </div>

      <button class="btn-round" id="previewBtn" style="border-radius:12px;height:44px;background:var(--track);font-weight:600;font-size:14px">
        Preview noise
      </button>
    </div>
  </details>

  <footer>Add to Home Screen for a full-screen app · settings save automatically</footer>
</main>

<script>
(function () {
  "use strict";

  // ---------- State ----------
  var defaults = { work: 25, rest: 5, volume: 50, tone: 2000, soundOn: true };
  var settings = load();

  var phase = "work";          // "work" | "rest"
  var running = false;
  var remaining = settings.work * 60; // seconds
  var sessionNum = 1;
  var tickHandle = null;
  var endTime = 0;             // absolute timestamp the phase ends
  var wakeLock = null;
  var previewing = false;

  // ---------- DOM ----------
  var $ = function (id) { return document.getElementById(id); };
  var timeDisplay = $("timeDisplay");
  var sessionCount = $("sessionCount");
  var phaseLabel = $("phaseLabel");
  var ringFg = $("ringFg");
  var playBtn = $("playBtn");
  var playIcon = $("playIcon");
  var hint = $("hint");

  var R = 92;
  var CIRC = 2 * Math.PI * R;
  ringFg.style.strokeDasharray = CIRC;

  // ---------- Audio ----------
  // The audible white noise IS a looping <audio> element (routed through a Web Audio lowpass for the
  // tone control). It must be a real media element, not a Web Audio buffer source, because iOS only
  // keeps audio playing while the screen is LOCKED for actual media elements — and that's also what
  // makes the lock-screen play/pause reliable. The element plays for the whole running session; the
  // gain node decides whether you actually hear it (silent during rest).
  // The clip is built as a seamless (crossfaded) loop so loop=true has no click/gap at the seam.
  var audioCtx = null, filterNode = null, gainNode = null, noiseEl = null, pausePending = null;

  // Build ~20s of white-noise WAV whose end crossfades into its start, so it loops with no seam.
  function makeNoiseURL() {
    var sr = 44100, seconds = 20, N = sr * seconds, cf = Math.floor(sr * 0.5), L = N - cf;
    var raw = new Float32Array(N);
    for (var i = 0; i < N; i++) raw[i] = Math.random() * 2 - 1;
    var bytes = 44 + L * 2, ab = new ArrayBuffer(bytes), dv = new DataView(ab);
    function ws(o, s) { for (var k = 0; k < s.length; k++) dv.setUint8(o + k, s.charCodeAt(k)); }
    ws(0, "RIFF"); dv.setUint32(4, bytes - 8, true); ws(8, "WAVE"); ws(12, "fmt ");
    dv.setUint32(16, 16, true); dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
    dv.setUint32(24, sr, true); dv.setUint32(28, sr * 2, true); dv.setUint16(32, 2, true); dv.setUint16(34, 16, true);
    ws(36, "data"); dv.setUint32(40, L * 2, true);
    for (var i = 0, off = 44; i < L; i++, off += 2) {
      // first cf samples blend the head with the wrapped tail (raw[i+L]) so the loop is continuous
      var s = i < cf ? raw[i] * (i / cf) + raw[i + L] * (1 - i / cf) : raw[i];
      if (s > 1) s = 1; else if (s < -1) s = -1;
      dv.setInt16(off, s * 0.9 * 32767, true);
    }
    return URL.createObjectURL(new Blob([ab], { type: "audio/wav" }));
  }

  function ensureAudio() {
    if (audioCtx) return;
    var AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    // iOS: play through the media/playback channel so the silent (mute) switch doesn't kill the noise.
    try { if (navigator.audioSession) navigator.audioSession.type = "playback"; } catch (e) {}

    noiseEl = new Audio();
    noiseEl.src = makeNoiseURL();
    noiseEl.loop = true;
    noiseEl.preload = "auto";

    var src = audioCtx.createMediaElementSource(noiseEl);
    filterNode = audioCtx.createBiquadFilter();
    filterNode.type = "lowpass";
    filterNode.frequency.value = settings.tone;
    filterNode.Q.value = 0.7;
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0;
    src.connect(filterNode);
    filterNode.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    // If the context wakes back up (after an interruption/route change), re-apply the right volume.
    audioCtx.onstatechange = function () {
      if (audioCtx.state === "running" && wantNoise()) rampGain(targetGain());
    };
  }

  // Audible right now? (focus block with sound on, or previewing.)
  function wantNoise() {
    return previewing || (running && phase === "work" && settings.soundOn);
  }

  function targetGain() {
    var v = settings.volume / 100;   // perceptual-ish curve, capped so it never blasts
    return v * v * 0.6;
  }

  function rampGain(to) {
    if (!gainNode || !audioCtx) return;
    var now = audioCtx.currentTime;
    gainNode.gain.cancelScheduledValues(now);
    gainNode.gain.setValueAtTime(gainNode.gain.value, now);
    gainNode.gain.linearRampToValueAtTime(to, now + 0.4);
  }

  // The single source of truth for audio. Keeps the element playing across the whole running session
  // (so it survives focus->rest->focus and the media session stays alive); the gain decides audibility.
  function syncAudioToState() {
    var shouldPlay = previewing || (running && settings.soundOn);  // element playing (maybe silent)
    if (shouldPlay) {
      if (pausePending) { clearTimeout(pausePending); pausePending = null; }
      ensureAudio();
      if (audioCtx.state !== "running") audioCtx.resume().catch(function () {});
      filterNode.frequency.value = settings.tone;
      var p = noiseEl.play();
      if (p && p.catch) p.catch(function () {});
      rampGain(wantNoise() ? targetGain() : 0);
    } else {
      if (gainNode) rampGain(0);
      if (noiseEl) {                 // fade out, then pause the media element
        if (pausePending) clearTimeout(pausePending);
        pausePending = setTimeout(function () { try { noiseEl.pause(); } catch (e) {} pausePending = null; }, 450);
      }
    }
  }

  // ---------- Rendering ----------
  function fmt(sec) {
    sec = Math.max(0, Math.round(sec));
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  }

  function totalForPhase() {
    return (phase === "work" ? settings.work : settings.rest) * 60;
  }

  function render() {
    timeDisplay.textContent = fmt(remaining);
    var total = totalForPhase();
    var frac = total > 0 ? remaining / total : 0;
    ringFg.style.strokeDashoffset = CIRC * (1 - frac);

    document.body.className = phase;
    phaseLabel.textContent = phase === "work" ? "Focus" : "Rest";
    sessionCount.textContent = "Session " + sessionNum;
    if (!flashTimer) document.title = fmt(remaining) + " · " + (phase === "work" ? "Focus" : "Rest");
    playIcon.innerHTML = running
      ? '<path d="M7 5h3v14H7zM14 5h3v14h-3z"/>'   // pause
      : '<path d="M8 5v14l11-7z"/>';               // play
    syncMedia();
  }

  // ---------- Desktop tab flash ----------
  // When a phase ends while you're on another tab, blink the tab title until you come back.
  var flashTimer = null, flashState = false;
  function startTitleFlash(msg) {
    if (document.visibilityState === "visible") return;   // you're already looking at it
    stopTitleFlash();
    flashTimer = setInterval(function () {
      flashState = !flashState;
      document.title = flashState ? "✨ " + msg : "    ";
    }, 850);
  }
  function stopTitleFlash() {
    if (flashTimer) { clearInterval(flashTimer); flashTimer = null; }
    flashState = false;
  }

  // ---------- Lock-screen / Media Session ----------
  // Gives iOS a proper title, icon and progress bar, and — by declaring playback "playing" for the
  // whole running session (focus AND rest) — keeps the audio session alive through the silent rest
  // so the next focus block isn't muted.
  var lastMetaKey = "";
  function syncMedia() {
    if (!("mediaSession" in navigator)) return;
    var key = phase + "|" + sessionNum;
    if (key !== lastMetaKey) {
      lastMetaKey = key;
      try {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: phase === "work" ? "Focus" : "Rest",
          artist: "Session " + sessionNum,
          album: "Focus Timer",
          artwork: [
            { src: "icon-192.png", sizes: "192x192", type: "image/png" },
            { src: "icon-512.png", sizes: "512x512", type: "image/png" }
          ]
        });
      } catch (e) {}
    }
    try { navigator.mediaSession.playbackState = running ? "playing" : "paused"; } catch (e) {}
    if (navigator.mediaSession.setPositionState) {
      try {
        var dur = totalForPhase();
        var pos = Math.min(dur, Math.max(0, dur - remaining));
        navigator.mediaSession.setPositionState({ duration: dur, playbackRate: 1, position: pos });
      } catch (e) {}
    }
  }

  function setupMediaHandlers() {
    if (!("mediaSession" in navigator)) return;
    var set = function (action, fn) {
      try { navigator.mediaSession.setActionHandler(action, fn); } catch (e) {}
    };
    set("play", function () { if (!running) start(); });
    set("pause", function () { if (running) pause(); });
    set("nexttrack", function () { if (previewing) stopPreview(); nextPhase(false); setHint("Skipped ahead"); });
    set("previoustrack", function () { backAction(); });
  }

  // ---------- Timer loop ----------
  // endTime is the absolute time the current phase ends. tick() catches up across any phase
  // boundaries that elapsed while the app was backgrounded (iOS freezes timers in the background).
  function tick() {
    var now = Date.now();
    if (running && now >= endTime) {
      var transitioned = false;
      var guard = 0;
      while (now >= endTime && guard++ < 10000) {
        advanceOneBoundary();
        transitioned = true;
      }
      if (transitioned) {
        chime(phase);                 // ding for the phase we landed in
        syncAudioToState();
        setHint(phase === "work" ? "Back to focus" : "Time to rest");
        startTitleFlash(phase === "work" ? "Focus time!" : "Rest time!");
      }
    }
    if (running) remaining = Math.max(0, (endTime - now) / 1000);
    render();
  }

  // Move past one completed phase: flip work<->rest and push endTime forward by the new phase's length.
  function advanceOneBoundary() {
    if (phase === "work") {
      phase = "rest";
    } else {
      phase = "work";
      sessionNum++;
    }
    endTime += totalForPhase() * 1000;
  }

  function startInterval() {
    clearInterval(tickHandle);
    tickHandle = setInterval(tick, 250);
  }

  function start() {
    if (running) return;
    running = true;
    endTime = Date.now() + remaining * 1000;
    startInterval();
    syncAudioToState();
    requestWake();
    setHint("");
    render();
  }

  function pause() {
    if (!running) return;
    remaining = Math.max(0, (endTime - Date.now()) / 1000); // freeze the remaining time
    running = false;
    clearInterval(tickHandle);
    syncAudioToState();
    releaseWake();
    render();
  }

  function toggle() {
    if (previewing) stopPreview();
    running ? pause() : start();
  }

  // Restart timing for whatever phase we're now in (full duration from now) and apply its audio.
  function resetPhaseTiming() {
    remaining = totalForPhase();
    if (running) {
      endTime = Date.now() + remaining * 1000;
      startInterval();
    }
    syncAudioToState();
  }

  function nextPhase(auto) {
    if (phase === "work") phase = "rest";
    else { phase = "work"; sessionNum++; }
    resetPhaseTiming();
    if (auto) setHint(phase === "work" ? "Back to focus" : "Time to rest");
    render();
  }

  function restartStep() {
    resetPhaseTiming();
    setHint("Step restarted");
    render();
  }

  function prevPhase() {
    if (phase === "rest") {
      phase = "work";
    } else { // currently work
      if (sessionNum > 1) { phase = "rest"; sessionNum--; }
      else { restartStep(); return; } // already at the very first step
    }
    resetPhaseTiming();
    setHint("Previous step");
    render();
  }

  // Spotify-style: tap within 5s of the step starting -> previous step; otherwise restart current step
  function backAction() {
    if (previewing) stopPreview();
    var elapsed = totalForPhase() - remaining;
    if (elapsed <= 5) prevPhase();
    else restartStep();
  }

  // gentle end-of-phase ding using the same audio context.
  // entering "rest" -> soft two-note descending ding; entering "work" -> brighter ascending ding.
  function chime(entering) {
    try {
      ensureAudio();
      if (audioCtx.state === "suspended") audioCtx.resume();
      var notes = entering === "rest" ? [880, 660] : [523.25, 783.99];
      notes.forEach(function (freq, i) {
        var o = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        o.type = "sine";
        o.frequency.value = freq;
        o.connect(g); g.connect(audioCtx.destination);
        var t = audioCtx.currentTime + i * 0.18;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.35, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
        o.start(t); o.stop(t + 0.6);
      });
    } catch (e) {}
    if (navigator.vibrate) navigator.vibrate(entering === "rest" ? [120, 60, 120] : 200);
  }

  // ---------- Wake lock (keep screen on while running) ----------
  function requestWake() {
    if (!("wakeLock" in navigator)) return;
    navigator.wakeLock.request("screen").then(function (w) { wakeLock = w; }).catch(function () {});
  }
  function releaseWake() {
    if (wakeLock) { wakeLock.release().catch(function(){}); wakeLock = null; }
  }
  // When we come back to the app (after a call, app switch, or screen unlock), catch the timer up
  // and restart the noise — iOS suspends the audio context and JS timers in the background.
  function onReturn() {
    stopTitleFlash();
    if (running) { tick(); requestWake(); }
    syncAudioToState();
  }
  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible") onReturn();
  });
  window.addEventListener("focus", onReturn);
  window.addEventListener("pageshow", onReturn);

  // Audio-output route changed (e.g. an AirPod taken out and put back in). Removing it pauses the
  // media element; when it reconnects, re-assert playback so the noise comes back on its own.
  // (We resume on reconnect rather than on removal so we never blast the phone speaker.)
  if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
    navigator.mediaDevices.addEventListener("devicechange", function () {
      if (running || previewing) syncAudioToState();
    });
  }

  // ---------- Preview ----------
  function startPreview() {
    previewing = true;
    syncAudioToState();
    $("previewBtn").textContent = "Stop preview";
  }
  function stopPreview() {
    previewing = false;
    syncAudioToState();
    $("previewBtn").textContent = "Preview noise";
  }

  // ---------- Settings UI ----------
  function setHint(t) {
    hint.textContent = t || (running ? "" : "Press play to begin · white noise plays during focus");
  }

  function syncSettingsUI() {
    $("workNum").textContent = settings.work;
    $("restNum").textContent = settings.rest;
    $("volume").value = settings.volume;
    $("volumeVal").textContent = settings.volume + "%";
    $("tone").value = settings.tone;
    $("toneVal").textContent = settings.tone + " Hz";
    $("soundOn").checked = settings.soundOn;
  }

  function save() {
    try { localStorage.setItem("focusTimer", JSON.stringify(settings)); } catch (e) {}
  }
  function load() {
    try {
      var s = JSON.parse(localStorage.getItem("focusTimer"));
      if (s && typeof s === "object") {
        return {
          work: clamp(s.work, 1, 120, defaults.work),
          rest: clamp(s.rest, 1, 60, defaults.rest),
          volume: clamp(s.volume, 0, 100, defaults.volume),
          tone: clamp(s.tone, 100, 12000, defaults.tone),
          soundOn: s.soundOn !== false
        };
      }
    } catch (e) {}
    return Object.assign({}, defaults);
  }
  function clamp(v, lo, hi, dflt) {
    v = Number(v);
    if (isNaN(v)) return dflt;
    return Math.min(hi, Math.max(lo, v));
  }

  // ---------- Wire up ----------
  playBtn.addEventListener("click", toggle);
  $("skipBtn").addEventListener("click", function () { if (previewing) stopPreview(); nextPhase(false); setHint("Skipped ahead"); });
  $("backBtn").addEventListener("click", backAction);

  document.querySelectorAll("#presets .chip").forEach(function (c) {
    c.addEventListener("click", function () {
      settings.tone = Number(c.dataset.tone);
      $("tone").value = settings.tone;
      $("toneVal").textContent = settings.tone + " Hz";
      if (filterNode) filterNode.frequency.value = settings.tone;
      markActivePreset();
      save();
    });
  });

  function markActivePreset() {
    document.querySelectorAll("#presets .chip").forEach(function (c) {
      c.classList.toggle("active", Number(c.dataset.tone) === settings.tone);
    });
  }

  document.querySelectorAll(".stepper button").forEach(function (b) {
    b.addEventListener("click", function () {
      var target = b.dataset.target;
      var act = b.dataset.act;
      var step = act === "inc" ? 1 : -1;
      settings[target] = clamp(settings[target] + step, 1, target === "work" ? 120 : 60, settings[target]);
      // if the changed phase is the current one and timer isn't running, reset display
      if (!running && phase === target) remaining = totalForPhase();
      else if (!running) remaining = totalForPhase(); // keep display in sync when idle
      syncSettingsUI();
      save();
      render();
    });
  });

  $("volume").addEventListener("input", function () {
    settings.volume = Number(this.value);
    $("volumeVal").textContent = settings.volume + "%";
    if (wantNoise()) rampGain(targetGain());
    save();
  });

  $("tone").addEventListener("input", function () {
    settings.tone = Number(this.value);
    $("toneVal").textContent = settings.tone + " Hz";
    if (filterNode) filterNode.frequency.value = settings.tone;
    markActivePreset();
    save();
  });

  $("soundOn").addEventListener("change", function () {
    settings.soundOn = this.checked;
    syncAudioToState();
    save();
  });

  $("previewBtn").addEventListener("click", function () {
    previewing ? stopPreview() : startPreview();
  });

  // spacebar = play/pause on desktop
  document.addEventListener("keydown", function (e) {
    if (e.code === "Space" && e.target.tagName !== "INPUT") { e.preventDefault(); toggle(); }
  });

  // ---------- Init ----------
  syncSettingsUI();
  markActivePreset();
  setupMediaHandlers();
  remaining = totalForPhase();
  render();
})();

// Register the service worker so the app installs and runs fully offline (HTTPS only).
// Auto-reloads once when a new version takes over, so updates apply without a manual reinstall.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    var hadController = !!navigator.serviceWorker.controller;
    var refreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      if (!hadController || refreshing) return; // skip the harmless first-install activation
      refreshing = true;
      window.location.reload();
    });
    navigator.serviceWorker.register("service-worker.js").catch(function () {});
  });
}
</script>
</body>
</html>
